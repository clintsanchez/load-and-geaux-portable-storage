<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Image: Portable Storage Size Guide (Refined)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-primary: #094840;
            --brand-accent: #7BDCB5;
            --brand-dark: #32373c;
            --font-main: 'Outfit', sans-serif;
            
            /* 16:9 Aspect Ratio */
            --container-width: 1080px;
            --container-height: 608px;
        }

        body {
            font-family: var(--font-main);
            background-color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #capture {
            width: var(--container-width);
            height: var(--container-height);
            background: white;
            display: flex;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.25);
            flex-shrink: 0;
            border-radius: 12px;
        }

        /* TEXT PANEL: 55% Width */
        .text-panel {
            width: 55%;
            height: 100%;
            background: white;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 20;
            border-right: 14px solid var(--brand-primary);
        }

        /* REFINE: Added a drop shadow to the panel edge for depth over the image */
        .text-panel::after {
            content: '';
            position: absolute;
            top: 0;
            right: -24px;
            bottom: 0;
            width: 10px;
            background: linear-gradient(90deg, rgba(0,0,0,0.15), transparent);
            z-index: 5;
        }

        .blueprint-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #cbd5e1 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            opacity: 0.15;
            z-index: -1;
        }

        /* REFINE: Professional Pill Kicker */
        .category-tag {
            display: inline-flex;
            background: var(--brand-primary);
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.75rem;
            margin-bottom: 2rem;
            box-shadow: 4px 4px 0px var(--brand-accent);
        }

        /* REFINE: Subtle text shadow for sharpness */
        .article-title {
            line-height: 0.88;
            color: var(--brand-primary);
            font-size: 62px;
            font-weight: 900;
            max-width: 540px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.02);
        }

        .sub-deck {
            font-size: 1.25rem;
            color: #64748b;
            line-height: 1.45;
            max-width: 440px;
            font-weight: 500;
            border-left: 4px solid var(--brand-accent);
            padding-left: 20px;
        }

        /* IMAGE PANEL: 45% Width */
        .image-panel {
            width: 45%;
            height: 100%;
            position: relative;
            background-color: #094840;
        }

        .image-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.05) brightness(0.95);
        }

        /* Gradient to smooth the transition */
        .image-shroud {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, transparent 40%);
            z-index: 10;
        }

        .footer-branding {
            margin-top: auto;
            padding-top: 35px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        /* REFINE: Brand URL Signature */
        .brand-signature {
            font-size: 11px;
            font-weight: 900;
            color: var(--brand-primary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.8;
        }

        .service-loc {
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

<div id="capture">
    <div class="text-panel">
        <div class="blueprint-overlay"></div>
        
        <div class="category-tag">Portable Storage Guide</div>
        
        <h1 class="article-title">
            What Size <br>Container Do <br><span class="text-[#7bdcb5]">You Need?</span>
        </h1>
        
        <p class="sub-deck">
            Baton Rouge moves are complex. We help you choose the right capacity before you load a single box.
        </p>

        <div class="footer-branding">
            <div>
                <p class="service-loc">Baton Rouge • St. Amant • Ascension</p>
                <div class="brand-signature mt-1">loadandgeaux.com</div>
            </div>
        </div>
    </div>

    <div class="image-panel">
        <div class="image-shroud"></div>
        <img src="https://loadandgeaux.com/wp-content/uploads/2024/11/load-and-geaux-portable-storage-container-next-to-house-in-baton-rouge-la.webp" 
             alt="Load & Geaux container next to home in Baton Rouge">
    </div>
</div>

</body>
</html>
